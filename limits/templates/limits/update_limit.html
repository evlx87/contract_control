{% extends 'contracts/base.html' %}

{% block title %}
    <title>Редактировать данные о доведенных лимитах</title>
{% endblock %}

{% block page_header %}
    <h1>Редактировать данные о доведенных лимитах</h1>
{% endblock %}

{% block page_content %}
<div class="add_form">
       <form method="post" novalidate>
           {% csrf_token %}
           {{ form.as_p }}
           <button type="submit">Сохранить изменения</button>
           <a href="{% url 'limits:limits_list' %}">Отмена</a>
       </form>
   </div>
{% endblock %}
